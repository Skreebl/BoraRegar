 
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Regas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f8f9fa;
    color: #000;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 400px;
    background: #f8f9fa;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header-box {
    background-color: #eeeeee;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 10px;
    width: 100%;
    text-align: center;
    margin-bottom: 25px;
    box-sizing: border-box;
    color: #333;
    font-size: 14px;
  }
  .row-inputs {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 15px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 30%;
  }
  .input-group-large {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    margin-bottom: 25px;
  }
  label {
    font-size: 14px;
    margin-bottom: 5px;
    color: #000;
  }
  input {
    width: 100%;
    padding: 10px 5px;
    text-align: center;
    border: 1px solid #666;
    font-size: 16px;
    box-sizing: border-box;
  }
  .btn-blue {
    width: 100%;
    padding: 15px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
  }
  .btn-blue:active {
    background-color: #0056b3;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    text-align: center;
    background: #fff;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 10px;
  }
  th {
    background-color: #eeeeee;
  }

  .assinatura {
    margin-top: 30px;
    margin-bottom: 10px;
    font-size: 15px;
    color: #777;
    text-align: center;
    width: 100%;
  }

</style>
</head>
 <body>
  

<div class="container">
  <div class="header-box" id="dataAtual">
    A carregar data...
  </div>

  <div class="input-group-large">
    <label>1ª REGA (INÍCIO)</label>
    <input type="time" id="horaInicio" step="1" value="08:00:00" style="width: 50%;">
  </div>

    <div class="row-inputs">
    <div class="input-group">
      <label>Intervalo</label>
      <input type="time" id="intervalo" step="1" value="00:00:00">
    </div>
    <div class="input-group">
      <label>Duração</label>
      <input type="time" id="duracao" step="1" value="00:00:00">
    </div>
    <div class="input-group">
      <label>Regas</label>
      <input type="number" id="quantidadeRegas" value="0" min="1">
    </div>
  </div>


  <button class="btn-blue" onclick="calcularRegas()">Calcular Horários</button>

  <table id="tabelaResultados" style="display:none;">
    <thead>
      <tr>
        <th>Nº</th>
        <th>Início</th>
        <th>Fim</th>
      </tr>
    </thead>
    <tbody id="corpoTabela">
    </tbody>
  </table>
    <div class="assinatura">
    Feito por Yurii Ivanytskyi 🤟🏻
  </div>
</div>
<script>
  function atualizarRelogio() {
    const dataAtualElemento = document.getElementById('dataAtual');
    const agora = new Date();
    
    const opcoesData = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    let dataFormatada = agora.toLocaleDateString('pt-PT', opcoesData);
    dataFormatada = dataFormatada.charAt(0).toUpperCase() + dataFormatada.slice(1);
    
    const horaFormatada = agora.toLocaleTimeString('pt-PT');
    
    dataAtualElemento.innerHTML = `${horaFormatada} - ${dataFormatada}`;
  }
  
  atualizarRelogio();
  setInterval(atualizarRelogio, 1000);

  function formatarTempo(dataObj) {
    return dataObj.toTimeString().split(' ')[0];
  }

  
  function carregarDadosSalvos() {
    if(localStorage.getItem('regas_horaInicio')) {
      document.getElementById('horaInicio').value = localStorage.getItem('regas_horaInicio');
    }
    if(localStorage.getItem('regas_intervalo')) {
      document.getElementById('intervalo').value = localStorage.getItem('regas_intervalo');
    }
    if(localStorage.getItem('regas_duracao')) {
      document.getElementById('duracao').value = localStorage.getItem('regas_duracao');
    }
    if(localStorage.getItem('regas_qtd')) {
      document.getElementById('quantidadeRegas').value = localStorage.getItem('regas_qtd');
    }
  }

  
  carregarDadosSalvos();

  
  function calcularRegas() {
    const strHoraInicio = document.getElementById('horaInicio').value;
    const strIntervalo = document.getElementById('intervalo').value;
    const strDuracao = document.getElementById('duracao').value;
    const qtdRegas = parseInt(document.getElementById('quantidadeRegas').value);

    if(!strHoraInicio || !strIntervalo || !strDuracao || !qtdRegas) {
      alert('Por favor, preencha todos os campos!');
      return;
    }

    
    localStorage.setItem('regas_horaInicio', strHoraInicio);
    localStorage.setItem('regas_intervalo', strIntervalo);
    localStorage.setItem('regas_duracao', strDuracao);
    localStorage.setItem('regas_qtd', qtdRegas);

    let [inicioH, inicioM, inicioS] = strHoraInicio.split(':').map(Number);
    if(isNaN(inicioS)) inicioS = 0;
    let tempoAtual = new Date(2000, 0, 1, inicioH, inicioM, inicioS);

    let [intH, intM, intS] = strIntervalo.split(':').map(Number);
    if(isNaN(intS)) intS = 0;
    const msIntervalo = (intH * 3600 + intM * 60 + intS) * 1000;

    let [durH, durM, durS] = strDuracao.split(':').map(Number);
    if(isNaN(durS)) durS = 0;
    const msDuracao = (durH * 3600 + durM * 60 + durS) * 1000;

    const corpoTabela = document.getElementById('corpoTabela');
    corpoTabela.innerHTML = '';

    for(let i = 1; i <= qtdRegas; i++) {
      let inicioFormatado = formatarTempo(tempoAtual);
      
      let tempoFim = new Date(tempoAtual.getTime() + msDuracao);
      let fimFormatado = formatarTempo(tempoFim);

      let tr = document.createElement('tr');
      tr.innerHTML = `<td><b>${i}</b></td><td>${inicioFormatado}</td><td>${fimFormatado}</td>`;
      corpoTabela.appendChild(tr);

      tempoAtual = new Date(tempoAtual.getTime() + msIntervalo);
    }

    document.getElementById('tabelaResultados').style.display = 'table';
  }

  // Реєструємо Service Worker для роботи офлайн
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker work!', reg))
        .catch(err => console.log('erro Service Worker:', err));
    });
  }
</script>


</body>
</html>
